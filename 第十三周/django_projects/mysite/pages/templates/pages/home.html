<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Quest</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: #f8fafc;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: #0f2130;
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .shell {
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(16, 37, 54, 0.92), rgba(7, 18, 30, 0.84)),
                url("/static/pages/images/mainbackground.png") center/cover no-repeat;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 78px;
            padding: 14px clamp(18px, 5vw, 74px);
            background: #111827;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.26);
        }

        .logo {
            color: #facc15;
            font-size: clamp(26px, 4vw, 42px);
            font-weight: 900;
            letter-spacing: 0;
            text-shadow: 0 4px 0 #5b2b12, 0 8px 0 rgba(0, 0, 0, 0.4);
            transform: rotate(-2deg);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-pill,
        .primary-button,
        .secondary-button,
        .tab-button {
            border: 0;
            border-radius: 8px;
            font-weight: 800;
        }

        .nav-pill {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            color: #dbeafe;
            background: #1f2937;
            text-decoration: none;
        }

        .primary-button {
            padding: 14px 24px;
            color: #102018;
            background: #34d399;
            box-shadow: 0 12px 0 #167853, 0 18px 38px rgba(0, 0, 0, 0.32);
        }

        .secondary-button {
            padding: 11px 16px;
            color: #f8fafc;
            background: #334155;
        }

        .start-screen {
            display: grid;
            min-height: calc(100vh - 78px);
            place-items: center;
            padding: 44px 22px;
        }

        .start-card {
            width: min(780px, 100%);
            text-align: center;
        }

        .title-frame {
            margin: 0 auto 34px;
            padding: 28px;
            border: 5px solid #0b1220;
            border-radius: 8px;
            color: #fff7ed;
            background: rgba(15, 23, 42, 0.74);
            box-shadow: 0 18px 0 rgba(0, 0, 0, 0.22);
        }

        h1 {
            margin: 0;
            font-size: clamp(48px, 10vw, 104px);
            line-height: 1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 18px auto 0;
            max-width: 640px;
            color: #bfdbfe;
            font-size: 20px;
            line-height: 1.7;
        }

        .map-screen {
            display: none;
            min-height: calc(100vh - 78px);
            padding: 26px 0 34px;
        }

        .map-screen.is-active {
            display: block;
        }

        .map-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 clamp(18px, 5vw, 74px) 22px;
        }

        .map-head h2 {
            margin: 0;
            color: #ffffff;
            font-size: clamp(28px, 4vw, 44px);
            letter-spacing: 0;
            text-shadow: 0 4px 0 rgba(0, 0, 0, 0.28);
        }

        .map-head p {
            margin: 8px 0 0;
            color: #cbd5e1;
        }

        .map-window {
            position: relative;
            min-height: 560px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 70px 80px 130px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            background:
                radial-gradient(circle at 14% 24%, rgba(255, 255, 255, 0.08) 0 46px, transparent 47px),
                radial-gradient(circle at 46% 68%, rgba(255, 255, 255, 0.07) 0 58px, transparent 59px),
                radial-gradient(circle at 84% 30%, rgba(255, 255, 255, 0.07) 0 52px, transparent 53px);
        }

        .map-window::-webkit-scrollbar {
            height: 14px;
        }

        .map-window::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: #facc15;
        }

        .map-track {
            position: relative;
            display: flex;
            align-items: center;
            gap: 130px;
            width: max-content;
            min-width: 1150px;
            min-height: 360px;
        }

        .map-track::before {
            position: absolute;
            top: 48%;
            left: 96px;
            width: calc(100% - 192px);
            height: 12px;
            border-radius: 999px;
            background: repeating-linear-gradient(90deg, #eab308 0 54px, #92400e 54px 78px);
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.22);
            content: "";
        }

        .level-node {
            position: relative;
            z-index: 1;
            display: grid;
            width: 190px;
            min-height: 240px;
            place-items: center;
            border: 0;
            color: #fff7ed;
            background: transparent;
            text-align: center;
            transform: translateY(calc((var(--lift) * -74px) + 30px));
        }

        .level-island {
            display: grid;
            width: 172px;
            height: 146px;
            place-items: center;
            border: 5px solid #3f2a19;
            border-radius: 42% 58% 52% 48% / 46% 39% 61% 54%;
            background:
                linear-gradient(145deg, #5b3a22 0 24%, #8b5e34 25% 45%, #315f3b 46% 100%);
            box-shadow: 0 14px 0 #1f2937, 0 28px 38px rgba(0, 0, 0, 0.32);
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .level-node:hover .level-island,
        .level-node.is-selected .level-island {
            filter: brightness(1.12);
            transform: translateY(-8px);
        }

        .level-icon {
            display: grid;
            width: 74px;
            height: 74px;
            place-items: center;
            border: 5px solid #78350f;
            border-radius: 50%;
            color: #422006;
            background: #facc15;
            font-size: 34px;
            font-weight: 900;
            box-shadow: inset 0 -9px 0 rgba(146, 64, 14, 0.24);
        }

        .level-name {
            display: block;
            margin-top: 18px;
            padding: 10px 14px;
            border: 3px solid #111827;
            border-radius: 8px;
            color: #111827;
            background: #fef3c7;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.28);
        }

        .level-code {
            display: block;
            margin-top: 9px;
            color: #e5e7eb;
            font-weight: 800;
            text-shadow: 0 3px 0 rgba(0, 0, 0, 0.36);
        }

        .detail-panel {
            display: none;
            margin: 24px clamp(18px, 5vw, 74px) 0;
            border: 4px solid #0b1220;
            border-radius: 8px;
            background: #f8fafc;
            color: #111827;
            box-shadow: 0 18px 0 rgba(0, 0, 0, 0.24);
        }

        .detail-panel.is-open {
            display: block;
        }

        .detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px;
            color: #f8fafc;
            background: #111827;
        }

        .detail-title h3 {
            margin: 0;
            font-size: 28px;
        }

        .detail-title span {
            display: block;
            margin-top: 6px;
            color: #cbd5e1;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px 18px;
            background: #e2e8f0;
        }

        .tab-button {
            padding: 11px 16px;
            color: #1f2937;
            background: #ffffff;
            box-shadow: 0 4px 0 #cbd5e1;
        }

        .tab-button.is-active {
            color: #102018;
            background: #34d399;
            box-shadow: 0 4px 0 #167853;
        }

        .tab-body {
            min-height: 480px;
            padding: 18px;
        }

        .iframe-wrap {
            height: min(58vh, 640px);
            min-height: 430px;
            overflow: hidden;
            border: 3px solid #111827;
            border-radius: 8px;
            background: #0b1020;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }

        .discussion-grid,
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .paper-card {
            min-height: 160px;
            padding: 18px;
            border: 3px solid #111827;
            border-radius: 8px;
            background: #fff7ed;
            box-shadow: 0 8px 0 #d6b98a;
        }

        .paper-card h4 {
            margin: 0 0 10px;
            font-size: 20px;
        }

        .paper-card p {
            margin: 0;
            color: #374151;
            line-height: 1.7;
        }

        .submit-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 14px;
            margin-top: 16px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            resize: vertical;
            padding: 14px;
            border: 3px solid #111827;
            border-radius: 8px;
            color: #d1fae5;
            background: #0b1020;
            line-height: 1.5;
        }

        .submit-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 3px solid #111827;
            border-radius: 8px;
        }

        .status {
            min-height: 44px;
            color: #166534;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
        }

        .logout-form {
            margin: 0;
        }

        .user-name {
            color: #a7f3d0;
            font-weight: 800;
        }

        @media (max-width: 880px) {
            .topbar,
            .map-head,
            .detail-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .map-window {
                min-height: 500px;
                padding-inline: 34px;
            }

            .map-track {
                gap: 80px;
                min-width: 980px;
            }

            .discussion-grid,
            .stats-grid,
            .submit-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="top-actions">
                {% if user.is_authenticated %}
                    <span class="user-name">{{ user.username }}</span>
                    <form class="logout-form" action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="nav-pill" type="submit">登出</button>
                    </form>
                {% else %}
                    <a class="nav-pill" href="{% url 'login' %}">登入</a>
                {% endif %}
                <a class="primary-button" href="/admin/">管理</a>
            </div>
        </header>

        <section class="start-screen" id="startScreen">
            <div class="start-card">
                <div class="title-frame">
                    <h1>pybryt</h1>
                </div>
                <button class="primary-button" id="startButton">開始遊戲</button>
            </div>
        </section>

        <main class="map-screen" id="mapScreen">
            <div class="map-head">
                <div>
                    <h2>章節</h2>
                </div>
                <button class="secondary-button" id="backButton">返回首頁</button>
            </div>

            <section class="map-window" aria-label="橫向地圖">
                <div class="map-track">
                    {% for level in levels %}
                        <button class="level-node" data-level="{{ level.id }}" style="--lift: {{ forloop.counter0|divisibleby:2|yesno:'0,1' }};">
                            <span class="level-island">
                                <span class="level-icon">{{ forloop.counter }}</span>
                            </span>
                            <span class="level-name">{{ level.title }}</span>
                            <span class="level-code">{{ level.chapter }} · {{ level.level }}</span>
                        </button>
                    {% endfor %}
                </div>
            </section>

            <section class="detail-panel" id="detailPanel">
                <div class="detail-head">
                    <div class="detail-title">
                        <h3 id="levelTitle">選擇關卡</h3>
                        <span id="levelMeta"></span>
                    </div>
                    <button class="secondary-button" id="closePanel">關閉關卡</button>
                </div>

                <div class="tabs">
                    <button class="tab-button is-active" data-tab="story">劇情</button>
                    <button class="tab-button" data-tab="game">遊戲</button>
                    <button class="tab-button" data-tab="discussion">討論區</button>
                    <button class="tab-button" data-tab="stats">關卡統計</button>
                </div>

                <div class="tab-body" id="tabBody"></div>
            </section>
        </main>
    </div>

    <script>
        const levels = {{ levels_json|safe }};
        let selectedLevel = "chapter-1-level-1";
        let selectedTab = "story";

        const startScreen = document.querySelector("#startScreen");
        const mapScreen = document.querySelector("#mapScreen");
        const detailPanel = document.querySelector("#detailPanel");
        const levelTitle = document.querySelector("#levelTitle");
        const levelMeta = document.querySelector("#levelMeta");
        const tabBody = document.querySelector("#tabBody");

        function getLevel() {
            return levels[selectedLevel];
        }

        function renderTab() {
            const level = getLevel();
            levelTitle.textContent = `${level.chapter}：${level.title}`;
            levelMeta.textContent = `小關：${level.level} · 難度：${level.difficulty}`;

            document.querySelectorAll(".level-node").forEach((node) => {
                node.classList.toggle("is-selected", node.dataset.level === selectedLevel);
            });

            document.querySelectorAll(".tab-button").forEach((button) => {
                button.classList.toggle("is-active", button.dataset.tab === selectedTab);
            });

            if (selectedTab === "story") {
                tabBody.innerHTML = `
                    <div class="iframe-wrap">
                        <iframe src="${level.story_url}" title="${level.title} 劇情"></iframe>
                    </div>
                `;
                return;
            }

            if (selectedTab === "game") {
                tabBody.innerHTML = `
                    <div class="iframe-wrap">
                        <iframe src="${level.game_url}" title="${level.title} 遊戲"></iframe>
                    </div>
                    <div class="submit-grid">
                        <textarea id="codeInput" spellcheck="false"># 完成 Jupyter 任務後，可以把程式貼在這裡存到後端
def solve():
    return "${level.title}"
</textarea>
                        <div class="submit-actions">
                            <input id="playerName" placeholder="玩家名稱" value="player">
                            <button class="primary-button" id="submitButton">儲存到後端</button>
                            <div class="status" id="submitStatus"></div>
                        </div>
                    </div>
                `;
                bindSubmit();
                return;
            }

            if (selectedTab === "discussion") {
                window.location.href = "/blog/";
                return;
            }

            tabBody.innerHTML = `
                <div class="stats-grid">
                    <article class="paper-card">
                        <h4>章節</h4>
                        <p>${level.chapter}</p>
                    </article>
                    <article class="paper-card">
                        <h4>小關</h4>
                        <p>${level.level}</p>
                    </article>
                    <article class="paper-card">
                        <h4>關卡重點</h4>
                        <p>${level.summary}</p>
                    </article>
                </div>
            `;
        }

        function openLevel(levelId) {
            selectedLevel = levelId;
            selectedTab = "story";
            detailPanel.classList.add("is-open");
            renderTab();
            detailPanel.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function bindSubmit() {
            const button = document.querySelector("#submitButton");
            if (!button) {
                return;
            }

            button.addEventListener("click", async () => {
                const status = document.querySelector("#submitStatus");
                const body = new URLSearchParams();
                body.set("level", selectedLevel);
                body.set("player", document.querySelector("#playerName").value);
                body.set("code", document.querySelector("#codeInput").value);
                status.textContent = "儲存中...";

                try {
                    const response = await fetch("/submit-solution/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body
                    });
                    const result = await response.json();
                    status.textContent = result.message;
                } catch (error) {
                    status.textContent = "儲存失敗，請確認 Django 伺服器仍在執行。";
                }
            });
        }

        document.querySelector("#startButton").addEventListener("click", () => {
            startScreen.style.display = "none";
            mapScreen.classList.add("is-active");
        });

        document.querySelector("#backButton").addEventListener("click", () => {
            mapScreen.classList.remove("is-active");
            detailPanel.classList.remove("is-open");
            startScreen.style.display = "grid";
        });

        document.querySelector("#closePanel").addEventListener("click", () => {
            detailPanel.classList.remove("is-open");
        });

        document.querySelectorAll(".level-node").forEach((node) => {
            node.addEventListener("click", () => openLevel(node.dataset.level));
        });

        document.querySelectorAll(".tab-button").forEach((button) => {
            button.addEventListener("click", () => {
                selectedTab = button.dataset.tab;
                renderTab();
            });
        });
    </script>
</body>
</html>
