<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登入 Code Quest</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            color: #f8fafc;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background:
                linear-gradient(135deg, rgba(16, 37, 54, 0.94), rgba(7, 18, 30, 0.9)),
                repeating-linear-gradient(45deg, transparent 0 96px, rgba(255, 255, 255, 0.045) 96px 99px, transparent 99px 192px),
                #13586b;
        }

        .login-card {
            width: min(420px, calc(100vw - 36px));
            padding: 28px;
            border: 5px solid #0b1220;
            border-radius: 8px;
            background: #f8fafc;
            color: #111827;
            box-shadow: 0 18px 0 rgba(0, 0, 0, 0.24);
        }

        h1 {
            margin: 0 0 20px;
            color: #111827;
            font-size: 34px;
            letter-spacing: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 800;
        }

        input {
            width: 100%;
            margin-bottom: 16px;
            padding: 12px;
            border: 3px solid #111827;
            border-radius: 8px;
            font: inherit;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            color: #7f1d1d;
            background: #fee2e2;
            font-weight: 800;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }

        button,
        a {
            border-radius: 8px;
            font-weight: 800;
            text-decoration: none;
        }

        button {
            border: 0;
            padding: 13px 20px;
            color: #102018;
            background: #34d399;
            box-shadow: 0 8px 0 #167853;
            cursor: pointer;
        }

        a {
            color: #1f2937;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>帳號登入</h1>
        {% if form.errors %}
            <div class="error">帳號或密碼不正確，請再試一次。</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="{{ form.username.id_for_label }}">帳號</label>
            {{ form.username }}
            <label for="{{ form.password.id_for_label }}">密碼</label>
            {{ form.password }}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="actions">
                <a href="/">返回首頁</a>
                <button type="submit">登入</button>
            </div>
        </form>
    </main>
</body>
</html>
